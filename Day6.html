<!DOCTYPE html>
<html>
  <head>
    <title>
      Flex-box
    </title>
    <style>
    .container{
      display: flex;
      flex-direction:row;
      justify-content:center;
      align-items:center;
      width: 100%;
      height: 100vh;
      border: 1px solid black;
      background-color: lightgray;
    }
    .box{
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 10px;
      height: 50px;
      width: 50px;
      border: 1px solid black;
      background-color: lightblue;
    }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="box">Box1</div>
      <div class="box">Box2</div>
      <div class="box">Box3</div>
    </div>
  </body>
</html>
